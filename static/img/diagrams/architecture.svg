<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400">
  <defs>
    <style>
      .component-box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.5; }
      .storage-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2.5; }
      .external-box { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2.5; }
      .title-text { font-family: -apple-system, sans-serif; font-size: 18px; fill: #111827; font-weight: 700; }
      .label-text { font-family: -apple-system, sans-serif; font-size: 14px; fill: #6b7280; }
      .heading { font-family: -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #111827; }
      .connection { stroke: #9ca3af; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .connection-label { font-family: -apple-system, sans-serif; font-size: 13px; fill: #4b5563; font-weight: 500; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9ca3af" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="35" class="heading" text-anchor="middle">EmailEngine Architecture</text>

  <!-- Your Application (Left) -->
  <rect x="50" y="120" width="220" height="160" class="external-box" rx="8"/>
  <text x="160" y="155" class="title-text" text-anchor="middle">Your Application</text>
  <text x="160" y="190" class="label-text" text-anchor="middle">Makes API calls</text>
  <text x="160" y="210" class="label-text" text-anchor="middle">to EmailEngine</text>
  <text x="160" y="240" class="label-text" text-anchor="middle">Receives webhooks</text>
  <text x="160" y="260" class="label-text" text-anchor="middle">from EmailEngine</text>

  <!-- Arrow: App to EmailEngine -->
  <path d="M 270 180 L 390 180" class="connection"/>
  <text x="310" y="170" class="connection-label">REST API</text>

  <!-- Arrow: EmailEngine to App -->
  <path d="M 390 220 L 270 220" class="connection"/>
  <text x="305" y="240" class="connection-label">Webhooks</text>

  <!-- EmailEngine (Center) -->
  <rect x="390" y="80" width="220" height="240" class="component-box" rx="8"/>
  <text x="500" y="115" class="title-text" text-anchor="middle">EmailEngine</text>
  <text x="500" y="150" class="label-text" text-anchor="middle">Connection management</text>
  <text x="500" y="175" class="label-text" text-anchor="middle">Data sync &amp; caching</text>
  <text x="500" y="200" class="label-text" text-anchor="middle">Queue management</text>
  <text x="500" y="225" class="label-text" text-anchor="middle">Webhook notifications</text>
  <text x="500" y="250" class="label-text" text-anchor="middle">Account orchestration</text>
  <text x="500" y="285" class="label-text" text-anchor="middle">Stores data in Redis</text>
  <text x="500" y="305" class="label-text" text-anchor="middle">Connects to email servers</text>

  <!-- Redis (Bottom Center) -->
  <rect x="390" y="340" width="220" height="50" class="storage-box" rx="8"/>
  <text x="500" y="370" class="title-text" text-anchor="middle">Redis</text>

  <!-- Email Providers (Right) -->
  <rect x="830" y="80" width="220" height="240" class="external-box" rx="8"/>
  <text x="940" y="115" class="title-text" text-anchor="middle">Email Providers</text>
  <text x="940" y="150" class="label-text" text-anchor="middle">Gmail</text>
  <text x="940" y="175" class="label-text" text-anchor="middle">Outlook / Microsoft 365</text>
  <text x="940" y="200" class="label-text" text-anchor="middle">Yahoo, AOL</text>
  <text x="940" y="225" class="label-text" text-anchor="middle">Generic IMAP/SMTP</text>
  <text x="940" y="250" class="label-text" text-anchor="middle">Custom servers</text>
  <text x="940" y="285" class="label-text" text-anchor="middle">via IMAP, SMTP,</text>
  <text x="940" y="305" class="label-text" text-anchor="middle">Gmail API, Graph API</text>

  <!-- Arrow: EmailEngine to Providers -->
  <path d="M 610 180 L 830 180" class="connection"/>
  <text x="685" y="170" class="connection-label">IMAP/SMTP/APIs</text>

  <!-- Arrow: Providers to EmailEngine -->
  <path d="M 830 220 L 610 220" class="connection"/>
  <text x="695" y="240" class="connection-label">Email data</text>
</svg>
