# EmailEngine URL Redirect Configuration for Caddy
# Generated from crawling existing sites on 2025-11-28
#
# Domain structure:
# - emailengine.app - Landing page (stays as is)
# - learn.emailengine.app - New Docusaurus documentation site
# - docs.emailengine.app - Old blog (redirects to learn.emailengine.app)
# - api.emailengine.app - Old API docs (redirects to learn.emailengine.app)

# =============================================================================
# learn.emailengine.app - New Docusaurus Documentation Site
# =============================================================================
# This is the new unified documentation site built with Docusaurus.

learn.emailengine.app {
    root * /path/to/docusaurus/build
    file_server

    # Handle SPA routing for docs
    handle /docs/* {
        try_files {path} {path}/ /docs/index.html
    }

    handle {
        try_files {path} {path}/ /index.html
    }
}

# =============================================================================
