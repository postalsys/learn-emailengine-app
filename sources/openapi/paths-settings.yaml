/v1/autoconfig:
  get:
    summary: Discover Email settings
    operationId: getV1Autoconfig
    description: Try to discover IMAP and SMTP settings for an email account
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: email
        in: query
        schema:
        type: string
        description: Email address to discover email settings for
        example: "sender@example.com"
        "x-format":
        email: true
        description: Email address to discover email settings for
        required: true
    tags:
      - Settings
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveredEmailSettings"
