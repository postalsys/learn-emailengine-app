"/v1/settings/queue/{queue}":
  get:
    summary: Show queue information
    operationId: getV1SettingsQueueQueue
    description: Show queue status and current state
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: queue
        in: path
        schema:
        type: string
        description: Queue ID
        example: notify
        enum:
        - notify
        - submit
        - documents
        "x-convert":
        trim: true
        description: Queue ID
        required: true
    tags:
      - Settings
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsQueueResponse"
  put:
    summary: Set queue settings
    operationId: putV1SettingsQueueQueue
    description: Set queue settings
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: queue
        in: path
        schema:
        type: string
        description: Queue ID
        example: notify
        enum:
        - notify
        - submit
        - documents
        "x-convert":
        trim: true
        description: Queue ID
        required: true
    tags:
      - Settings
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SettingsPutQueuePayload"
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsPutQueueResponse"