        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: gateway
        in: path
        schema:
        type: string
        description: Gateway ID
        example: example
        maxLength: 256
        description: Gateway ID
        required: true
    tags:
      - SMTP Gateway
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateGateway"
