/v1/accounts:
  get:
    summary: List accounts
    operationId: getV1Accounts
    description: Lists registered accounts
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: page
        in: query
        schema:
        type: integer
        description: "Page number (zero indexed, so use 0 for first page)"
        example: 0
        default: 0
        minimum: 0
        maximum: 1048576
        description: "Page number (zero indexed, so use 0 for first page)"
      -
        name: pageSize
        in: query
        schema:
        type: integer
        description: How many entries per page
        example: 20
        default: 20
        minimum: 1
        maximum: 1000
        description: How many entries per page
      -
        name: state
        in: query
        schema:
        type: string
        description: Filter accounts by state
        example: connected
        enum:
        - init
        - syncing
        - connecting
        - connected
        - authenticationError
        - connectError
        - unset
        - disconnected
        description: Filter accounts by state
      -
        name: query
        in: query
        schema:
        type: string
        description: Filter accounts by string match
        example: "user@example.com"
        description: Filter accounts by string match
    tags:
      - Account
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountsFilterResponse"
/v1/changes:
  get:
    summary: Stream state changes
    operationId: getV1Changes
    description: Stream account state changes as an EventSource
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
    tags:
      - Account
    responses:
      default:
        description: Successful
        content:
          "text/event-stream":
            schema:
              type: string
"/v1/account/{account}":
  get:
    summary: Get account info
    operationId: getV1AccountAccount
    description: Returns stored information about the account. Passwords are not included.
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: quota
        in: query
        schema:
        type: boolean
        description: "If true, then include quota information in the response"
        default: false
        description: "If true, then include quota information in the response"
    tags:
      - Account
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountResponse"
  delete:
    summary: Remove account
    operationId: deleteV1AccountAccount
    description: Stop processing and clear the account's cache
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
    tags:
      - Account
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequestResponse"
  put:
    summary: Update account info
    operationId: putV1AccountAccount
    description: Updates account information
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
    tags:
      - Account
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateAccount"
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Model18"
