"/v1/account/{account}/messages":
  get:
    summary: List messages in a folder
    operationId: getV1AccountAccountMessages
    description: Lists messages in a mailbox folder
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: path
        in: query
        schema:
        type: string
        description: "Mailbox folder path. Can use special use labels like \"\\Sent\". Special value \"\\All\" is available for Gmail IMAP, Gmail API, MS Graph API accounts."
        example: INBOX
        description: "Mailbox folder path. Can use special use labels like \"\\Sent\". Special value \"\\All\" is available for Gmail IMAP, Gmail API, MS Graph API accounts."
        required: true
      -
        name: cursor
        in: query
        schema:
        type: string
        description: "Paging cursor from `nextPageCursor` or `prevPageCursor` value"
        example: imap_kcQIji3UobDDTxc
        maxLength: 1048576
        "x-convert":
        trim: true
        description: "Paging cursor from `nextPageCursor` or `prevPageCursor` value"
      -
        name: page
        in: query
        schema:
        type: integer
        description: "Page number (zero-indexed, so use 0 for the first page). Only supported for IMAP accounts. Deprecated; use the paging cursor instead. If the page cursor value is provided, then the page number value is ignored."
        example: 0
        default: 0
        minimum: 0
        maximum: 1048576
        description: "Page number (zero-indexed, so use 0 for the first page). Only supported for IMAP accounts. Deprecated; use the paging cursor instead. If the page cursor value is provided, then the page number value is ignored."
      -
        name: pageSize
        in: query
        schema:
        type: integer
        description: How many entries per page
        example: 20
        default: 20
        minimum: 1
        maximum: 1000
        description: How many entries per page
    tags:
      - Message
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageList"
"/v1/account/{account}/text/{text}":
  get:
    summary: Retrieve message text
    operationId: getV1AccountAccountTextText
    description: Retrieves message text
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: text
        in: path
        schema:
        type: string
        description: Message text ID
        example: AAAAAQAACnAcdfaaN
        maxLength: 10240
        description: Message text ID
        required: true
      -
        name: maxBytes
        in: query
        schema:
        type: integer
        description: Max length of text content
        example: 52428800
        minimum: 0
        maximum: 1073741824
        description: Max length of text content
      -
        name: textType
        in: query
        schema:
        type: string
        description: "Which text content to return, use * for all. By default all contents are returned."
        example: "*"
        default: "*"
        enum:
        - html
        - plain
        - "*"
        "x-convert":
        case: lower
        description: "Which text content to return, use * for all. By default all contents are returned."
    tags:
      - Message
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextResponse"
