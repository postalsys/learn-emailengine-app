"/v1/account/{account}/message/{message}":
  get:
    summary: Get message information
    operationId: getV1AccountAccountMessageMessage
    description: "Returns details of a specific message. By default text content is not included, use textType value to force retrieving text"
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: message
        in: path
        schema:
        type: string
        description: Message ID
        example: AAAAAQAACnA
        maxLength: 256
        description: Message ID
        required: true
      -
        name: maxBytes
        in: query
        schema:
        type: integer
        description: Max length of text content
        example: 5248000
        minimum: 0
        maximum: 1073741824
        description: Max length of text content
      -
        name: textType
        in: query
        schema:
        type: string
        description: "Which text content to return, use * for all. By default text content is not returned."
        example: "*"
        enum:
        - html
        - plain
        - "*"
        "x-convert":
        case: lower
        description: "Which text content to return, use * for all. By default text content is not returned."
      -
        name: webSafeHtml
        in: query
        schema:
        type: boolean
        description: "Shorthand option to fetch and preprocess HTML and inlined images. Overrides `textType`, `preProcessHtml`, and `preProcessHtml` options."
        default: false
        description: "Shorthand option to fetch and preprocess HTML and inlined images. Overrides `textType`, `preProcessHtml`, and `preProcessHtml` options."
      -
        name: embedAttachedImages
        in: query
        schema:
        type: boolean
        description: "If true, then fetches attached images and embeds these in the HTML as data URIs"
        default: false
        description: "If true, then fetches attached images and embeds these in the HTML as data URIs"
      -
        name: preProcessHtml
        in: query
        schema:
        type: boolean
        description: "If true, then pre-processes HTML for compatibility"
        default: false
        description: "If true, then pre-processes HTML for compatibility"
      -
        name: markAsSeen
        in: query
        schema:
        type: boolean
        description: "If true, then marks unseen email as seen while returning the message"
        default: false
        description: "If true, then marks unseen email as seen while returning the message"
    tags:
      - Message
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageDetails"
  delete:
    summary: Delete message
    operationId: deleteV1AccountAccountMessageMessage
    description: Move message to Trash or delete it if already in Trash
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: message
        in: path
        schema:
        type: string
        description: Message ID
        example: AAAAAQAACnA
        maxLength: 256
        description: Message ID
        required: true
      -
        name: force
        in: query
        schema:
        type: boolean
        description: Delete message even if not in Trash. Not supported for Gmail API accounts.
        default: false
        description: Delete message even if not in Trash. Not supported for Gmail API accounts.
    tags:
      - Message
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageDeleteResponse"
  put:
    summary: Update message
    operationId: putV1AccountAccountMessageMessage
    description: Update message information. Mainly this means changing message flag values
    parameters:
      -
        name: "x-ee-timeout"
        in: header
        schema:
        type: integer
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
        minimum: 0
        maximum: 7200000
        description: Request timeout in milliseconds (overrides EENGINE_TIMEOUT environment variable)
      -
        name: account
        in: path
        schema:
        type: string
        description: Unique identifier for the email account
        example: user123
        maxLength: 256
        "x-convert":
        trim: true
        description: Unique identifier for the email account
        required: true
      -
        name: message
        in: path
        schema:
        type: string
        description: Message ID
        example: AAAAAQAACnA
        maxLength: 256
        description: Message ID
        required: true
    tags:
      - Message
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageUpdate"
    responses:
      "200":
        description: Successful
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageUpdateResponse"
